<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b3f20" />
  <title>工研院快樂隊小宇宙</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{
      --gold:#FFD700;
      --page:#0b3f20;
      --panel:#144d1f;
      --line:#45a4ff;
      --line-green:#50ff56;
      --blue-card:#0d486a;
      --green-card:#1ea32d;
      --label:#ffffff;
    }
    *{box-sizing:border-box}
    body{
      background: linear-gradient(180deg,#0a3c1f 0%, #0b5324 100%);
      color:#fff;
      min-height:100vh;
      font-family:"Microsoft JhengHei UI","Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif;
    }
    .safe-top{padding-top:env(safe-area-inset-top)}
    .safe-bottom{padding-bottom:env(safe-area-inset-bottom)}
    .app-shell{max-width:430px;margin:0 auto;min-height:100vh;position:relative}
    .header{
      position:sticky;top:0;z-index:30;
      background:rgba(11,63,32,.96);
      border-bottom:1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(10px);
    }
    .gold{color:var(--gold)}
    .page-title{color:var(--gold);font-weight:800;font-size:1.95rem;line-height:1}
    .section-title{color:var(--gold);font-weight:800;font-size:1.65rem;line-height:1.1}
    .section-subtitle{color:#fff;opacity:.9;font-size:.95rem}
    .panel{
      background:rgba(22,85,28,.88);
      border:1.5px solid rgba(255,255,255,.12);
      border-radius:28px;
      box-shadow:0 8px 24px rgba(0,0,0,.18) inset;
    }
    .pill-btn{
      border-radius:16px;
      border:1px solid rgba(255,255,255,.15);
      background:rgba(255,255,255,.08);
      color:#fff;
      padding:.55rem .95rem;
      font-size:.85rem;
    }
    .login-input{
      width:100%;border-radius:22px;border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.14);padding:14px 16px;color:#fff;font-size:1.05rem;
      outline:none;
    }
    .login-btn{
      width:100%;border-radius:22px;background:#13d072;color:#073a1f;font-weight:800;
      padding:14px 16px;font-size:1.12rem;
    }
    .member-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .member-card{
      min-height:78px;border-radius:18px;padding:10px 12px 9px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
      display:flex;justify-content:space-between;gap:10px;align-items:stretch;
    }
    .member-card.blue{background:linear-gradient(180deg,#0f4e74 0%, #0b3855 100%)}
    .member-card.green{background:linear-gradient(180deg,#33c53a 0%, #1d8f2a 100%)}
    .member-left{display:flex;flex-direction:column;justify-content:space-between;min-width:0}
    .member-name{font-size:14pt;font-weight:800;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .member-name.member{color:var(--gold)}
    .member-name.newbie{color:#fff}
    .member-hcp{font-size:18pt;font-weight:900;line-height:1;color:var(--gold);margin-top:4px}
    .member-right{display:flex;flex-direction:column;justify-content:space-between;align-items:flex-end}
    .mini-label{font-size:10pt;line-height:1.1;color:#fff;white-space:nowrap}
    .badge{
      display:inline-flex;align-items:center;justify-content:center;min-width:48px;
      padding:4px 9px;border-radius:999px;font-size:9.5pt;line-height:1;background:rgba(255,255,255,.18);color:#fff
    }
    .detail-wrap{
      border-radius:26px;padding:18px;border:2px solid var(--line);background:rgba(17,86,23,.75)
    }
    .detail-wrap.senior{border-color:var(--line-green)}
    .detail-name{font-size:1.95rem;font-weight:900;color:var(--gold);line-height:1}
    .card-grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .card-grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .stat-card{
      border-radius:18px;border:1.5px solid var(--line);background:rgba(0,0,0,.10);padding:12px
    }
    .detail-wrap.senior .stat-card{border-color:var(--line-green)}
    .stat-title{color:#fff;font-size:1.05rem;line-height:1.15}
    .stat-value{color:var(--gold);font-size:2rem;font-weight:900;line-height:1.05;margin-top:8px}
    .small-value{font-size:1.65rem}
    .subtext{color:#fff;font-size:1rem;line-height:1.35}
    .match-card{
      border-radius:18px;padding:12px 14px;background:linear-gradient(180deg,#f3f3db 0%, #d2df99 100%);color:#275021
    }
    .match-card.alt{
      background:linear-gradient(180deg,#efefef 0%, #d7d7d0 100%);
    }
    .match-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
    .match-name{font-size:1.8rem;font-weight:900;color:#16a34a;line-height:1}
    .match-rank{font-size:1.8rem;font-weight:900;color:#8b3ea9;line-height:1}
    .score-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:12px}
    .score-grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
    .score-box{background:rgba(64,115,28,.88);border-radius:10px;padding:8px 6px;text-align:center;color:#fff}
    .score-num{font-size:2rem;font-weight:900;color:var(--gold);line-height:1}
    .score-lab{font-size:1rem;line-height:1.1;margin-top:4px}
    .list-panel{
      border-radius:18px;border:1.5px solid #57ff2f;background:rgba(7,58,23,.38);padding:10px 10px 12px
    }
    .list-panel.white{border-color:#fff}
    .list-title{font-size:1.4rem;line-height:1;color:#fff;margin-bottom:8px}
    .name-grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
    .name-badges{display:flex;flex-wrap:wrap;gap:8px}
    .name-chip{
      display:inline-flex;align-items:center;justify-content:center;
      min-height:34px;padding:0 10px;border-radius:8px;border:1.5px solid #57ff2f;color:var(--gold);background:rgba(87,255,47,.09);font-size:1rem
    }
    .name-chip.white{border-color:#fff;color:#fff;background:rgba(255,255,255,.06)}
    .finance-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .finance-card{border-radius:18px;border:1.5px solid var(--line-green);background:rgba(0,0,0,.12);padding:14px}
    .finance-card .stat-title{font-size:1.15rem}
    .finance-card .stat-value{font-size:1.8rem}
    .footer-nav{
      position:fixed;left:0;right:0;bottom:0;z-index:35;background:rgba(11,63,32,.96);
      border-top:1px solid rgba(255,255,255,.12);backdrop-filter: blur(10px)
    }
    .footer-nav-inner{max-width:430px;margin:0 auto;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:2px;padding:8px 8px calc(8px + env(safe-area-inset-bottom))}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 2px;border-radius:16px;color:var(--gold);font-size:.9rem;line-height:1.1;text-align:center}
    .nav-item.active{background:rgba(255,215,0,.08);box-shadow: inset 0 -2px 0 rgba(255,215,0,.35)}
    .nav-ico{font-size:1.7rem;line-height:1}
    .months{display:flex;gap:8px;overflow:auto;padding-bottom:8px}
    .month-btn{border-radius:14px;border:1.5px solid #57ff2f;color:#fff;background:rgba(0,0,0,.12);padding:.7rem .7rem;min-width:52px;line-height:1.1}
    .month-btn.active{background:rgba(87,255,47,.2);color:var(--gold)}
    .hidden{display:none !important}
    .hscroll{overflow:auto}
    .table-box table{min-width:100%;font-size:.9rem}
    .table-box th,.table-box td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.1);white-space:nowrap}
  
    .table-box{
      max-height:54vh;
      overflow:auto;
      border:1px solid rgba(255,255,255,.12);
      border-radius:14px;
    }
    .table-box table{border-collapse:separate;border-spacing:0;width:100%}
    .table-box thead th{
      position:sticky;
      top:0;
      z-index:5;
      background:#14551f;
      color:var(--gold);
      box-shadow:0 1px 0 rgba(255,255,255,.18);
    }
    .table-box th,.table-box td{
      padding:5px 8px !important;
      line-height:1.25;
      font-size:.78rem;
    }

  
    .table-box th:first-child,
    .table-box td:first-child{
      position:sticky;
      left:0;
      z-index:4;
      background:#14551f;
      color:#fff;
      box-shadow:1px 0 0 rgba(255,255,255,.15);
    }
    .table-box thead th:first-child{
      z-index:8;
      color:var(--gold);
    }

  
    .member-card,
    .stat-card,
    .match-card,
    .nav-item {
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    .member-card:active,
    .stat-card:active,
    .match-card:active,
    .nav-item:active {
      transform: scale(0.97);
      filter: brightness(1.1);
    }

    .member-card:active {
      transform: scale(0.96);
    }

    .monthly-record-table{width:100%;border-collapse:separate;border-spacing:0;font-size:.9rem}
    .monthly-record-table th{color:var(--gold);font-weight:800;background:rgba(255,255,255,.06)}
    .monthly-record-table th,.monthly-record-table td{padding:7px 8px;border-bottom:1px solid rgba(255,255,255,.12);text-align:center}
    .annual-award{display:flex;align-items:center;justify-content:space-between;gap:10px;border-radius:14px;border:1.5px solid #57ff2f;background:rgba(0,0,0,.10);padding:10px 12px;margin-bottom:8px}
    .annual-label{color:var(--gold);font-weight:900;font-size:1.05rem}
    .annual-name{color:#fff;font-weight:800;flex:1;text-align:center}
    .annual-score{color:var(--gold);font-weight:900;min-width:44px;text-align:right}

    .rule-box {
      max-height: 60vh;
      overflow-y: auto;
      margin-top: 12px;
      padding: 14px;
      border: 1.5px solid #57ff2f;
      border-radius: 14px;
      background: rgba(0,0,0,.10);
      font-size: 13px;
      line-height: 1.65;
      color: rgba(255,255,255,.92);
    }

    .rule-title {
      color: #FFD700;
      font-weight: 900;
      font-size: 15px;
      margin: 12px 0 6px;
    }

    .rule-subtitle {
      color: #FFD700;
      font-weight: 700;
      margin-top: 8px;
    }

    .rule-box p {
      margin: 4px 0;
    }

  </style>
</head>
<body>
<div class="app-shell">
  <header class="header safe-top">
    <div class="px-3 py-3 flex items-center gap-3">
      <div class="h-12 w-12 rounded-2xl flex items-center justify-center bg-black/10 overflow-hidden">
        <img src="./icons/icon-192.png" alt="" class="h-10 w-10 object-contain">
      </div>
      <div class="flex-1 min-w-0">
        <div class="gold font-extrabold text-xl leading-none">工研院快樂隊小宇宙</div>
        <div id="topUser" class="mt-1 text-sm text-white/90">請先登入</div>
      </div>
      <button id="btnLogout" class="hidden rounded-2xl bg-emerald-500 text-white px-4 py-3 font-bold text-base">登出</button>
    </div>
  </header>

  <main class="px-3 pt-4 pb-28 safe-bottom">
    <section id="viewLogin">
      <div class="panel p-5">
        <div class="section-title mb-5">登入</div>
        <div class="panel p-5 text-center mb-4" style="background:rgba(0,0,0,.10)">
          <div class="gold text-[2rem] font-black leading-none">~歡迎~</div>
          <div class="mt-5 text-white text-[1.15rem] leading-[1.9] font-semibold">
            對高爾夫球有熱忱,<br>
            遵守高爾夫規則,<br>
            發揮高爾夫精神,<br>
            追求健康快樂的院友和球友
          </div>
        </div>
        <div class="text-white/80 text-base mb-4">輸入球隊密碼與姓名（需存在於「會員總表」的姓名欄）</div>
        <div class="space-y-4">
          <div>
            <div class="text-sm text-white/85 mb-1">球隊密碼</div>
            <input id="teamPwd" class="login-input" type="password" placeholder="輸入球隊密碼" />
          </div>
          <div>
            <div class="text-sm text-white/85 mb-1">姓名</div>
            <input id="memberName" class="login-input" type="text" placeholder="例：王小明" />
          </div>
          <button id="btnLogin" class="login-btn">進入</button>
          <div id="loginMsg" class="hidden text-sm text-rose-300"></div>
          <div class="text-sm text-white/60 leading-7">
            📱 建議將本頁加入主畫面（像 App 一樣使用）<br>
            iPhone：分享 → 加入主畫面<br>
            Android：瀏覽器選單 → 安裝應用程式
          </div>
        </div>
      </div>
    </section>

    <section id="viewApp" class="hidden">
      <div id="routeOutlet"></div>
    </section>
  </main>

  <nav id="bottomNav" class="footer-nav hidden">
    <div class="footer-nav-inner">
      <a href="#/home" class="nav-item" data-route="/home"><div class="nav-ico">🧑‍💼</div><div>會員戰績表</div></a>
      <a href="#/monthly" class="nav-item" data-route="/monthly"><div class="nav-ico">🏆</div><div>賽事龍虎榜</div></a>
      <a href="#/annual" class="nav-item" data-route="/annual"><div class="nav-ico">👑</div><div>年度風雲錄</div></a>
      <a href="#/finance" class="nav-item" data-route="/finance"><div class="nav-ico">💰</div><div>快樂財經閣</div></a>
    </div>
  </nav>
</div>

<script src="./config.js"></script>
<script>
const $ = id => document.getElementById(id);
const show = el => el.classList.remove('hidden');
const hide = el => el.classList.add('hidden');

function getSession(){
  return {
    team: sessionStorage.getItem('teamPwd') || '',
    name: sessionStorage.getItem('memberName') || ''
  };
}
function setSession(team,name){
  sessionStorage.setItem('teamPwd', team);
  sessionStorage.setItem('memberName', name);
}
function clearSession(){
  sessionStorage.removeItem('teamPwd');
  sessionStorage.removeItem('memberName');
}
function topUserText(text){ $('topUser').textContent = text; }
function setNavActive(route){
  document.querySelectorAll('.nav-item').forEach(a => a.classList.toggle('active', a.dataset.route === route));
}
function escapeHtml(s){
  return String(s ?? '')
    .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
    .replaceAll('"','&quot;').replaceAll("'",'&#039;');
}
function fmtNum(x){
  const s = String(x ?? '').trim();
  return s || '0';
}
function setLoading(btn, on, text='登入中...'){
  if(!btn) return;
  if(on){
    btn.dataset.oldText = btn.textContent;
    btn.disabled = true;
    btn.classList.add('opacity-70');
    btn.textContent = text;
  }else{
    btn.disabled = false;
    btn.classList.remove('opacity-70');
    btn.textContent = btn.dataset.oldText || '進入';
  }
}
async function apiGet(params){
  const url = new URL(API_BASE);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString(), { cache: 'no-store' });
  if(!res.ok) throw new Error('HTTP '+res.status);
  return await res.json();
}
function renderShellLoggedIn(name){
  hide($('viewLogin'));
  show($('viewApp'));
  show($('bottomNav'));
  show($('btnLogout'));
  topUserText('已登入：' + name);
}
function renderShellLoggedOut(){
  show($('viewLogin'));
  hide($('viewApp'));
  hide($('bottomNav'));
  hide($('btnLogout'));
  topUserText('請先登入');
  $('routeOutlet').innerHTML = '';
  window.location.hash = '#/home';
}
function pageSection(title, subtitle, inner){
  return `
    <section>
      <div class="section-title">${title}</div>
      ${subtitle ? `<div class="section-subtitle mt-1">${subtitle}</div>`:''}
      <div class="mt-4">${inner}</div>
    </section>
  `;
}

async function routeHome(){
  return routeMembers();
}
async function routeMembers(){
  setNavActive('/home');
  const { team } = getSession();
  $('routeOutlet').innerHTML = pageSection('會員戰績表','',`<div id="memberGrid" class="member-grid"></div>`);
  const grid = $('memberGrid');
  try{
    const json = await apiGet({ action:'members', team });
    if(!json.ok) throw new Error(json.error || 'unknown');
    const members = (json.members || [])
  .filter(x => String(x['姓名']||'').trim())
  .sort((a,b)=>{
    const pa = Number(a['年度積分'] || 0);
    const pb = Number(b['年度積分'] || 0);

    // 先比積分（高 → 低）
    if (pb !== pa) return pb - pa;

    // 同分再用姓名排序（避免亂跳）
    return String(a['姓名']||'').localeCompare(String(b['姓名']||''),'zh-Hant');
  });
    grid.innerHTML = members.map(m => {
      const senior = String(m['最新樂齡'] || m['樂齡'] || '').trim().toUpperCase()==='Y';
      const cardClass = senior ? 'green' : 'blue';
      const identity = String(m['身份']||'會員').trim() || '會員';
      const nmClass = identity === '新人' ? 'newbie' : 'member';
      const seniorLabel = senior ? '樂齡' : '一般';
      return `
        <button class="member-card ${cardClass}" data-name="${escapeHtml(m['姓名'])}">
          <div class="member-left">
            <div class="member-name ${nmClass}">${escapeHtml(m['姓名'])}</div>
            <div class="member-hcp">${escapeHtml(m['最新差點'] || '—')}</div>
          </div>
          <div class="member-right">
            <div class="mini-label">${escapeHtml(identity)}</div>
            <div>${senior ? `<span class="badge">${seniorLabel}</span>` : `<div class="mini-label">${seniorLabel}</div>`}</div>
          </div>
        </button>
      `;
    }).join('');
    grid.querySelectorAll('[data-name]').forEach(btn => {
      btn.addEventListener('click', () => {
        window.location.hash = '#/member/' + encodeURIComponent(btn.dataset.name || '');
      });
    });
  }catch(err){
    grid.innerHTML = `<div class="panel p-4 text-rose-300">${escapeHtml(String(err.message||err))}</div>`;
  }
}

function normalizeKeyMap(obj){
  const keys = Object.keys(obj || {});
  return keys.map(k => ({ raw:k, norm:k.toLowerCase().replace(/\s+/g,'') }));
}
function findList(obj, patterns){
  const items = normalizeKeyMap(obj);
  for(const p of patterns){
    const found = items.find(x => x.norm.includes(p));
    if(found) return obj[found.raw] || [];
  }
  return [];
}
function findStat(arr, patterns){
  const list = arr || [];
  for(const p of patterns){
    const found = list.find(x => String(x.category||'').toLowerCase().replace(/\s+/g,'').includes(p));
    if(found) return found;
  }
  return null;
}
function scoreCard(label, value){
  return `<div class="score-box"><div class="score-num">${escapeHtml(value ?? '—')}</div><div class="score-lab">${escapeHtml(label)}</div></div>`;
}
function podiumCard(item, rank, labels){
  if(!item) return '';
  const labs = labels && labels.length>=4 ? labels.slice(0,4) : ['總桿','淨桿','差點','新差'];
  const vals = item.stats || [];
  const rankColor = rank==='冠軍'?'#8b3ea9':'#8b3ea9';
  return `
    <div class="match-card ${rank==='亞軍' || rank==='季軍' ? 'alt':''}">
      <div class="match-head">
        <div class="match-name">${escapeHtml(item.name || '')}</div>
        <div class="match-rank" style="color:${rankColor}">${rank}</div>
      </div>
      <div class="score-grid">
        ${scoreCard(labs[0], vals[0])}
        ${scoreCard(labs[1], vals[1])}
        ${scoreCard(labs[2], vals[2])}
        ${scoreCard(labs[3], vals[3])}
      </div>
    </div>
  `;
}
function twoStatCard(item, label){
  if(!item) return '';
  const vals = item.stats || [];
  return `
    <div class="match-card alt">
      <div class="match-head">
        <div class="match-name">${escapeHtml(item.name || '')}</div>
        <div class="match-rank">${label}</div>
      </div>
      <div class="score-grid two">
        ${scoreCard('總桿', vals[0])}
        ${scoreCard('淨桿', vals[1])}
      </div>
    </div>
  `;
}
function fixedFourPanel(title, names){
  const chips = Array.from({length:4},(_,i)=>`<span class="name-chip">${escapeHtml(names[i] || '')}</span>`).join('');
  return `<div class="list-panel"><div class="list-title">${title}</div><div class="name-grid-4">${chips}</div></div>`;
}
function variablePanel(title, names, white=false){
  const chips = names.length ? names.map(n => `<span class="name-chip ${white?'white':''}">${escapeHtml(n)}</span>`).join('') : `<span class="name-chip ${white?'white':''}" style="opacity:.7">　</span>`;
  return `<div class="list-panel ${white?'white':''}"><div class="list-title">${title}</div><div class="name-badges">${chips}</div></div>`;
}
async function routeMonthly(){
  setNavActive('/monthly');
  const { team } = getSession();
  $('routeOutlet').innerHTML = pageSection('賽事龍虎榜','',`
    <div class="months">

  let currentMonth = new Date().getMonth()+1;
  document.querySelectorAll('.month-btn').forEach(btn => btn.addEventListener('click', ()=>{
    currentMonth = Number(btn.dataset.m);
    loadMonth(currentMonth);
  }));

  let touchStartX = null;
  let touchStartY = null;
  const monthlyArea = $('routeOutlet');

  monthlyArea.addEventListener('touchstart', (ev)=>{
    if(!ev.touches || !ev.touches.length) return;
    touchStartX = ev.touches[0].clientX;
    touchStartY = ev.touches[0].clientY;
  }, {passive:true});

  monthlyArea.addEventListener('touchend', (ev)=>{
    if(touchStartX === null || !ev.changedTouches || !ev.changedTouches.length) return;
    const dx = ev.changedTouches[0].clientX - touchStartX;
    const dy = ev.changedTouches[0].clientY - touchStartY;
    touchStartX = null;
    touchStartY = null;
    if(Math.abs(dx) < 60 || Math.abs(dx) < Math.abs(dy)*1.2) return;

    loadMonth(currentMonth);
  }, {passive:true});

  loadMonth(currentMonth);

function numOrNull(x){
  const s = String(x ?? '').replace(/,/g,'').trim();
  if(!s) return null;
  const n = Number(s);
  return Number.isFinite(n) ? n : null;
}
function pickFinanceSummary(financeTable){
  if(!financeTable || financeTable.length < 2) return {monthLabel:'', balance:null};
  const header = financeTable[0];
  const firstCol = financeTable.map(r => String(r[0] || '').trim());
  const idx = firstCol.findIndex(v => v === '結餘');
  if(idx === -1) return {monthLabel:'', balance:null};
  const row = financeTable[idx];
  for(let c=row.length-1;c>=1;c--){
    const n = numOrNull(row[c]);
    if(n !== null) return {monthLabel: header[c] || '', balance:n};
  }
  return {monthLabel:'', balance:null};
}
function matrixTable(values){
  if(!values || !values.length) return '<div class="text-white/70">（沒有資料）</div>';
  let html = '<div class="table-box hscroll"><table><thead><tr>';
  values[0].forEach(h => html += `<th>${escapeHtml(h)}</th>`);
  html += '</tr></thead><tbody>';
  values.slice(1).forEach(r=>{
    html += '<tr>';
    r.forEach(c => html += `<td>${escapeHtml(c)}</td>`);
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function findFieldValue(obj, containsList, fallback=''){
  const entries = Object.entries(obj || {});
  for(const needle of containsList){
    const hit = entries.find(([k,v]) => String(k).replace(/\s+/g,'').includes(needle) && String(v ?? '').trim() !== '');
    if(hit) return hit[1];
  }
  return fallback;
}
function findMetaValue(...sources){
  for(const src of sources){
    if(src !== undefined && src !== null && String(src).trim() !== '') return src;
  }
  return '-';
}


function monthlyRecordsHtml(m){
  const rows = [];
  for(let i=1;i<=12;i++){
    const gross = m[`${i}月總桿`] || '';
    const net = m[`${i}月淨桿`] || '';
    const rank = m[`${i}月名次`] || '';
    if(String(gross || net || rank).trim()){
      rows.push({month:i, gross, net, rank});
    }
  }
  if(!rows.length){
    return `<div class="subtext mt-4" style="min-height:90px">（尚無月例賽戰績）</div>`;
  }
  return `
    <div class="table-box mt-3" style="max-height:260px">
      <table class="monthly-record-table">
        <thead><tr><th>月份</th><th>總桿</th><th>淨桿</th><th>名次</th></tr></thead>
        <tbody>
          ${rows.map(r=>`<tr><td>${r.month}月</td><td>${escapeHtml(r.gross)}</td><td>${escapeHtml(r.net)}</td><td>${escapeHtml(r.rank)}</td></tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;
}

async function router(){
  const { team, name } = getSession();
  if(!team || !name){
    renderShellLoggedOut();
    return;
  }
  renderShellLoggedIn(name);
  const hash = location.hash.replace(/^#/,'') || '/home';
  if(hash.startsWith('/member/')){
    const memberName = decodeURIComponent(hash.slice('/member/'.length));
    await routeMemberDetail(memberName);
    return;
  }
  const fn = routes[hash] || routeHome;
  await fn();
}

$('btnLogin').addEventListener('click', async ()=>{
  const team = ($('teamPwd').value || '').trim();
  const name = ($('memberName').value || '').trim();
  if(!team || !name){
    $('loginMsg').textContent = '請輸入球隊密碼與姓名';
    show($('loginMsg'));
    return;
  }
  show($('loginMsg'));
  $('loginMsg').textContent = '';
  setLoading($('btnLogin'), true, '登入中...');
  try{
    const json = await apiGet({ action:'login', team, name });
    if(!json.ok){
      throw new Error(json.error || '登入失敗');
    }
    setSession(team, name);
    window.location.hash = '#/home';
    await router();
  }catch(err){
    $('loginMsg').textContent = '登入失敗：' + String(err.message || err);
    show($('loginMsg'));
  }finally{
    setLoading($('btnLogin'), false);
  }
});

$('btnLogout').addEventListener('click', ()=>{
  clearSession();
  renderShellLoggedOut();
});

window.addEventListener('hashchange', router);
window.addEventListener('load', async ()=>{
  if('serviceWorker' in navigator){
    try{ await navigator.serviceWorker.register('./service-worker.js'); }catch(e){}
  }
  router();
});
</script>
</body>
</html>
